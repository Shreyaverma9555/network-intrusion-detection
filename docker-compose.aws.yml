services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nid
      POSTGRES_USER: nid_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.aws}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nid_user -d nid"]
      interval: 10s
      timeout: 5s
      retries: 10

  dashboard:
    build:
      context: .
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NID_POSTGRES_DSN: "host=127.0.0.1 port=5432 dbname=nid user=nid_user password=${POSTGRES_PASSWORD}"
      NID_WINDOW_SECONDS: ${NID_WINDOW_SECONDS:-0.5}
      NID_PACKET_LIMIT: ${NID_PACKET_LIMIT:-500}
      NID_MIN_PACKETS: ${NID_MIN_PACKETS:-10}
      NID_ALERT_THRESHOLD: ${NID_ALERT_THRESHOLD:-0.75}
      NID_FULL_SHAP_LIVE: ${NID_FULL_SHAP_LIVE:-0}
      NID_AUTO_RESPONSE: ${NID_AUTO_RESPONSE:-0}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      NID_ENABLE_GEOIP: ${NID_ENABLE_GEOIP:-0}
      NID_ALERT_WEBHOOK: ${NID_ALERT_WEBHOOK:-}
      NID_DISCORD_WEBHOOK: ${NID_DISCORD_WEBHOOK:-}
      NID_EMAIL_TO: ${NID_EMAIL_TO:-}
      NID_EMAIL_FROM: ${NID_EMAIL_FROM:-nid-alerts@localhost}
      NID_SMTP_HOST: ${NID_SMTP_HOST:-}
      NID_SMTP_PORT: ${NID_SMTP_PORT:-587}
      NID_SMTP_TLS: ${NID_SMTP_TLS:-1}
      NID_SMTP_USERNAME: ${NID_SMTP_USERNAME:-}
      NID_SMTP_PASSWORD: ${NID_SMTP_PASSWORD:-}
      NID_TELEGRAM_BOT_TOKEN: ${NID_TELEGRAM_BOT_TOKEN:-}
      NID_TELEGRAM_CHAT_ID: ${NID_TELEGRAM_CHAT_ID:-}

volumes:
  postgres_data:
