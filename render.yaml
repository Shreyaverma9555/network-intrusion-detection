services:
  - type: web
    name: nid-soc-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: NID_SENSOR_API_KEY
        generateValue: true
      - key: NID_API_USERNAME
        value: admin
      - key: NID_API_PASSWORD
        sync: false
      - key: NID_API_ROLE
        value: admin
      - key: CORS_ORIGINS
        value: http://localhost:5173
      - key: ALLOWED_HOSTS
        value: "*.onrender.com"
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: FORCE_HTTPS
        value: "0"
      - key: PYTHON_VERSION
        value: 3.11.9
