services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: nid
      POSTGRES_USER: nid_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nid_user -d nid"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://nid_user:${POSTGRES_PASSWORD}@postgres:5432/nid
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      NID_SENSOR_API_KEY: ${NID_SENSOR_API_KEY:?Set NID_SENSOR_API_KEY in .env}
      NID_API_USERS_JSON: ${NID_API_USERS_JSON:?Set NID_API_USERS_JSON in .env}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      RATE_LIMIT_PER_MINUTE: ${RATE_LIMIT_PER_MINUTE:-120}
      FORCE_HTTPS: ${FORCE_HTTPS:-0}
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY:-}
      VIRUSTOTAL_API_KEY: ${VIRUSTOTAL_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    volumes:
      - ./logs:/app/logs

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
