apiVersion: apps/v1
kind: Deployment
metadata:
  name: nid-soc-api
  namespace: nid-soc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nid-soc-api
  template:
    metadata:
      labels:
        app: nid-soc-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
      containers:
        - name: api
          image: ghcr.io/YOUR_ORG/nid-soc-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: nid-soc-config
            - secretRef:
                name: nid-soc-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: nid-soc-api
  namespace: nid-soc
spec:
  selector:
    app: nid-soc-api
  ports:
    - name: http
      port: 80
      targetPort: http
